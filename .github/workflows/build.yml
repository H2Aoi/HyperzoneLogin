name: Build & Publish

on:
  push:
    branches: ["master"]
    paths-ignore:
      - "dist/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build shadowJar

      - name: Collect Artifacts (dist/)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          sha="${GITHUB_SHA::7}"
          found=0

          shopt -s nullglob
          for f in openvc/build/libs/*-all.jar; do
            found=1
            base="$(basename "$f")"
            cp -f "$f" "dist/${base%.*}-${sha}.jar"
            cp -f "$f" "dist/${base%.*}-latest.jar"
          done
          if [ "$found" -eq 0 ]; then
            for f in openvc/build/libs/*.jar; do
              found=1
              base="$(basename "$f")"
              cp -f "$f" "dist/${base%.*}-${sha}.jar"
              cp -f "$f" "dist/${base%.*}-latest.jar"
            done
          fi
          if [ "$found" -eq 0 ]; then
            echo "No jar artifacts found under openvc/build/libs/"
            exit 1
          fi

      - name: Commit & Push dist/
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain dist)" ]; then
            echo "dist/ unchanged; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist
          if git diff --cached --quiet; then
            echo "dist/ staged but unchanged; skipping commit."
            exit 0
          fi
          git commit -m "chore(ci): update dist artifacts [skip ci]"
          git push origin HEAD:master

      - name: Upload Artifact (Actions)
        uses: actions/upload-artifact@v4
        with:
          name: HyperZoneLogin-dist
          path: dist/**
